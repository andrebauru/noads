# Nginx Reverse Proxy - you.andretsc.dev
# Localização: /etc/nginx/sites-available/you.andretsc.dev

# Configuração do Backend Python
upstream noads_backend {
    server 127.0.0.1:8001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ✅ CORREÇÃO: Esta diretiva PRECISA ficar fora do bloco server
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Redirecionamento HTTP para HTTPS
server {
    listen 80;
    server_name you.andretsc.dev;
    return 301 https://$server_name$request_uri;
}

# Configuração Principal HTTPS
server {
    listen 443 ssl http2;
    server_name you.andretsc.dev;

    # Certificados SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/you.andretsc.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/you.andretsc.dev/privkey.pem;
    
    # Configurações de Segurança SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Otimização Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Raiz do Site (Frontend)
    root /var/www/you.andretsc.dev;
    index index.html;

    # ============ Rotas da Aplicação ============
    
    # Frontend (HTML/CSS/JS)
    location / {
        try_files $uri $uri/ /index.html;
        add_header 'Access-Control-Allow-Origin' '*';
    }

    # ✅ API Backend: Extração de Metadados
    location /extract.php {
        proxy_pass http://noads_backend/extract.php;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
        
        proxy_connect_timeout 20s;
        proxy_send_timeout 20s;
        proxy_read_timeout 20s;
        
        proxy_set_header Connection "";
    }

    # ✅ API Backend: Download e Conversão MP3 (Timeout Longo)
    location /download {
        proxy_pass http://noads_backend/download;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
        
        # Timeout de 5 minutos para conversões pesadas de MP3
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        proxy_set_header Connection "";
    }

    # ✅ Rota alternativa /api
    location /api/extract {
        proxy_pass http://noads_backend/extract.php;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header 'Access-Control-Allow-Origin' '*';
        proxy_connect_timeout 20s;
        proxy_send_timeout 20s;
        proxy_read_timeout 20s;
    }

    # ============ Cache e Performance ============
    
    location ~* \.html?$ {
        expires -1;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ============ Segurança e Logs ============
    
    location ~ /\. {
        deny all;
    }

    location ~ /\.well-known {
        allow all;
    }

    # Aplicação do limite de requisições configurado no topo
    limit_req zone=general burst=20 nodelay;

    access_log /var/log/nginx/you.andretsc.dev.access.log;
    error_log /var/log/nginx/you.andretsc.dev.error.log;
}
