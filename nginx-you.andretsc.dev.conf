# Nginx Reverse Proxy - you.andretsc.dev
# Localização: /etc/nginx/sites-available/you.andretsc.dev

upstream noads_backend {
    server 127.0.0.1:8001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name you.andretsc.dev;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name you.andretsc.dev;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/you.andretsc.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/you.andretsc.dev/privkey.pem;
    
    # SSL Config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    root /var/www/you.andretsc.dev;
    index index.html;

    # ============ Rotas da Aplicação ============
    
    # Frontend (HTML/CSS/JS)
    location / {
        try_files $uri $uri/ /index.html;
        add_header 'Access-Control-Allow-Origin' '*';
    }

    # ✅ API Backend (reverse proxy para Python)
    location /extract.php {
        proxy_pass http://noads_backend/extract.php;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers (já vem da API Python, mas reforçamos)
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
        
        # Timeout (yt-dlp pode levar até 15s)
        proxy_connect_timeout 20s;
        proxy_send_timeout 20s;
        proxy_read_timeout 20s;
        
        # Connection keep-alive
        proxy_set_header Connection "";
    }

    # ✅ Alternativa: /api (compatível com qualquer client)
    location /api/extract {
        proxy_pass http://noads_backend/extract.php;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header 'Access-Control-Allow-Origin' '*';
        proxy_connect_timeout 20s;
        proxy_send_timeout 20s;
        proxy_read_timeout 20s;
    }

    # ============ Cache e Performance ============
    
    # Cache HTML (não cache)
    location ~* \.html?$ {
        expires -1;
    }

    # Cache Assets (30 dias)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ============ Segurança ============
    
    # Desabilitar acesso a arquivos ocultos
    location ~ /\. {
        deny all;
    }

    # Desabilitar acesso a diretórios
    location ~ /\.well-known {
        allow all;
    }

    # Limitar requisições
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req zone=general burst=20 nodelay;

    # Logging
    access_log /var/log/nginx/you.andretsc.dev.access.log;
    error_log /var/log/nginx/you.andretsc.dev.error.log;
}
